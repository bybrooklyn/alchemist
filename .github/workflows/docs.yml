name: Documentation source

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'contracts/openapi.yaml'
      - 'LICENSE-DOCUMENTATION-CC-BY-SA-4.0'
      - 'scripts/check_docs.py'
      - 'scripts/check_api_contract.py'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'contracts/openapi.yaml'
      - 'LICENSE-DOCUMENTATION-CC-BY-SA-4.0'
      - 'scripts/check_docs.py'
      - 'scripts/check_api_contract.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-source-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate documentation source
        run: python3 scripts/check_docs.py

      - name: Validate API contract
        run: python3 scripts/check_api_contract.py
