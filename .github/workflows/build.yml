name: Build

on:
  workflow_call:
    inputs:
      version_suffix:
        description: >
          Suffix appended to the VERSION file content.
          Empty string for stable releases.
          For nightly: "-nightly+abc1234"
        type: string
        required: false
        default: ""
      push_docker:
        description: Whether to push the Docker image
        type: boolean
        required: false
        default: false
      docker_tags:
        description: Newline-separated list of Docker tags to push
        type: string
        required: false
        default: ""
      prerelease:
        description: Whether to mark the GitHub release as prerelease
        type: boolean
        required: false
        default: false
      make_latest:
        description: Whether to mark as latest release
        type: boolean
        required: false
        default: false
      release_tag:
        description: The git tag to use for the GitHub release
        type: string
        required: false
        default: ""
      release_name:
        description: The display name of the GitHub release
        type: string
        required: false
        default: ""
      publish_release:
        description: Whether to publish a GitHub release
        type: boolean
        required: false
        default: false
    secrets:
      GITHUB_TOKEN:
        required: true

env:
  IMAGE_NAME: ghcr.io/bybrooklyn/alchemist

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: bun-${{ github.workflow }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: bun-${{ github.workflow }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Astro diagnostics
        run: bun run check

      - name: Build
        run: bun run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist
          retention-days: 1

  build-linux:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: alchemist-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact_name: alchemist-linux-aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist

      - name: Read VERSION
        id: ver
        shell: bash
        run: |
          base=$(tr -d '\n\r' < VERSION)
          echo "version=${base}${{ inputs.version_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: build-linux-${{ matrix.target }}

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        env:
          ALCHEMIST_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          BINARY="target/${{ matrix.target }}/release/alchemist"
          ARCHIVE="${{ matrix.artifact_name }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.tar.gz.sha256

  build-windows:
    needs: [build-frontend]
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist

      - name: Read VERSION
        id: ver
        shell: bash
        run: |
          base=$(tr -d '\n\r' < VERSION)
          echo "version=${base}${{ inputs.version_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: build-windows-x86_64

      - name: Build
        env:
          ALCHEMIST_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cp "target/x86_64-pc-windows-msvc/release/alchemist.exe" \
             "alchemist-windows-x86_64.exe"
          sha256sum "alchemist-windows-x86_64.exe" \
            > "alchemist-windows-x86_64.exe.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alchemist-windows-x86_64
          path: |
            alchemist-windows-x86_64.exe
            alchemist-windows-x86_64.exe.sha256

  build-macos:
    needs: [build-frontend]
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact_name: alchemist-macos-x86_64
          - target: aarch64-apple-darwin
            artifact_name: alchemist-macos-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist

      - name: Read VERSION
        id: ver
        shell: bash
        run: |
          base=$(tr -d '\n\r' < VERSION)
          echo "version=${base}${{ inputs.version_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: build-macos-${{ matrix.target }}

      - name: Build
        env:
          ALCHEMIST_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          BINARY="target/${{ matrix.target }}/release/alchemist"
          ARCHIVE="${{ matrix.artifact_name }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.tar.gz.sha256

  build-docker:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: inputs.push_docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ inputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  publish-release:
    needs:
      [build-linux, build-windows, build-macos, build-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.publish_release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: alchemist-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.make_latest }}
          overwrite_files: true
          generate_release_notes: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
