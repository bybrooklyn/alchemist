openapi: 3.0.3
info:
  title: Alchemist API
  version: 0.3.2-rc.2
  description: >
    Stable v1 API contract for Alchemist clients. Canonical routes live under
    /api/v1. Legacy /api routes remain available as compatibility aliases, but
    new external clients should use /api/v1.
servers:
  - url: /
security:
  - sessionCookie: []
  - bearerToken: []
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: alchemist_session
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status, detail, code, request_id, error]
      properties:
        type:
          type: string
          example: urn:alchemist:problem:auth-required
        title:
          type: string
          example: Unauthorized
        status:
          type: integer
          example: 401
        detail:
          type: string
          example: Unauthorized
        instance:
          type: string
          nullable: true
          example: /api/v1/engine/status
        code:
          type: string
          example: AUTH_REQUIRED
        request_id:
          type: string
          example: 2c168dbf-6f29-41eb-a8e7-0fd563f76fd4
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: AUTH_REQUIRED
            message:
              type: string
              example: Unauthorized
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true
    ApiToken:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        access_level:
          type: string
          enum: [read_only, arr_webhook, jellyfin, full_access]
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
    EngineStatus:
      type: object
      properties:
        status:
          type: string
          enum: [running, paused, draining]
        manual_paused:
          type: boolean
        scheduler_paused:
          type: boolean
        draining:
          type: boolean
        blocked_reason:
          type: string
          nullable: true
          enum: [manual_paused, scheduled_pause, draining, workers_busy]
    GenericObject:
      type: object
      additionalProperties: true
    UpdateStatus:
      type: object
      properties:
        current_version:
          type: string
        channel:
          type: string
          enum: [stable, rc, nightly]
        latest_version:
          type: string
          nullable: true
        update_available:
          type: boolean
        release_url:
          type: string
          nullable: true
        checked_at:
          type: string
          format: date-time
        install_type:
          type: string
          enum: [docker, homebrew, aur, source, direct_binary, windows_exe, unknown]
        can_self_update:
          type: boolean
        action:
          type: string
          enum: [self_update, guided, unsupported]
        guidance:
          type: string
          nullable: true
        guidance_command:
          type: string
          nullable: true
        verification_status:
          type: string
          enum: [verified, public_key_unavailable, manifest_unavailable, failed]
        verification_error:
          type: string
          nullable: true
  responses:
    Ok:
      description: Operation completed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OkResponse"
    Accepted:
      description: Operation accepted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OkResponse"
    Problem:
      description: Error response
      headers:
        X-Request-Id:
          schema:
            type: string
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
paths:
  /api/v1/auth/login:
    post:
      summary: Create an authenticated session cookie
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Session created
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/auth/logout:
    post:
      summary: Clear the authenticated session cookie
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/conversion/jobs/{id}:
    get:
      summary: Get a staged conversion job
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Conversion job
        default:
          $ref: "#/components/responses/Problem"
    delete:
      summary: Delete a staged conversion job and removable artifacts
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/conversion/jobs/{id}/download:
    get:
      summary: Download completed conversion output
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Converted media stream
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/conversion/jobs/{id}/start:
    post:
      summary: Queue a staged conversion job
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/conversion/preview:
    post:
      summary: Preview conversion command and estimates
      responses:
        "200":
          description: Conversion preview
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/conversion/uploads:
    post:
      summary: Upload source media for conversion
      responses:
        "200":
          description: Upload accepted
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/engine/drain:
    post:
      summary: Stop accepting new work after current jobs finish
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/engine/mode:
    get:
      summary: Get engine mode and active limits
      responses:
        "200":
          description: Engine mode
        default:
          $ref: "#/components/responses/Problem"
    post:
      summary: Set engine mode and optional overrides
      responses:
        "200":
          description: Engine mode
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/engine/pause:
    post:
      summary: Pause job processing
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/engine/restart:
    post:
      summary: Restart the engine loop
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/engine/resume:
    post:
      summary: Resume job processing
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/engine/status:
    get:
      summary: Get engine status
      responses:
        "200":
          description: Engine status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineStatus"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/engine/stop-drain:
    post:
      summary: Leave draining mode
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/events:
    get:
      summary: Subscribe to server-sent events
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/fs/browse:
    get:
      summary: Browse server filesystem paths for setup and settings
      responses:
        "200":
          description: Directory listing
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/fs/preview:
    post:
      summary: Preview selected filesystem paths
      responses:
        "200":
          description: Path preview
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/fs/recommendations:
    get:
      summary: Get filesystem directory recommendations
      responses:
        "200":
          description: Directory recommendations
        default:
          $ref: "#/components/responses/Problem"
  /api/v1/health:
    get:
      summary: Health check
